kind = "web"
previewPath = "/"
title = "KitchenCoast"
version = "1.0.0"
id = "artifacts/kitchencost"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23040
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/kitchencost run dev"

[services.env]
PORT = "23040"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/kitchencost", "run", "build"]
publicDir = "artifacts/kitchencost/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
